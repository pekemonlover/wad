<div style="max-width: 400px; margin: 50px auto; border: 1px solid #ccc; padding: 20px; border-radius: 8px;">
  @if (user()) {
    <h2>User Profile</h2>
    <p><strong>Username:</strong> {{ user()?.username }}</p>
    <p><strong>Email:</strong> {{ user()?.email }}</p>
    <button (click)="handleLogout()">Logout</button>
  } @else {
    <p>No user logged in. Please <a routerLink="/login">Login</a>.</p>
  }
</div>
